name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Verify results/ and docs/ match committed corpus/reports/
        run: |
          node corpus/build-results.mjs
          node corpus/build-site.mjs
          git diff --exit-code -- results/ docs/ || {
            echo "::error::results/ or docs/ is out of sync with corpus/reports/ — run 'npm run corpus' and commit the diff."
            exit 1
          }
